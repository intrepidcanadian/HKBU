<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cat Head -->
  <circle cx="50" cy="50" r="35" fill="#8B5CF6"/>

  <!-- Cat Ears -->
  <polygon points="25,25 35,40 15,40" fill="#8B5CF6"/>
  <polygon points="75,25 85,40 65,40" fill="#8B5CF6"/>
  <polygon points="28,28 35,38 20,38" fill="#A78BFA"/>
  <polygon points="72,28 80,38 65,38" fill="#A78BFA"/>

  <!-- Cat Eyes -->
  <ellipse cx="38" cy="45" rx="8" ry="10" fill="white"/>
  <ellipse cx="62" cy="45" rx="8" ry="10" fill="white"/>
  <circle cx="40" cy="47" r="4" fill="#1F2937"/>
  <circle cx="64" cy="47" r="4" fill="#1F2937"/>
  <circle cx="41" cy="46" r="1.5" fill="white"/>
  <circle cx="65" cy="46" r="1.5" fill="white"/>

  <!-- Cat Nose -->
  <polygon points="50,55 45,62 55,62" fill="#F472B6"/>

  <!-- Cat Mouth -->
  <path d="M50 62 Q45 70 40 65" stroke="#1F2937" stroke-width="2" fill="none"/>
  <path d="M50 62 Q55 70 60 65" stroke="#1F2937" stroke-width="2" fill="none"/>

  <!-- Cat Whiskers -->
  <line x1="25" y1="55" x2="5" y2="50" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="25" y1="60" x2="5" y2="62" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="75" y1="55" x2="95" y2="50" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="75" y1="60" x2="95" y2="62" stroke="#1F2937" stroke-width="1.5"/>

  <!-- Cat Head Detail -->
  <path d="M30 30 Q50 20 70 30" stroke="#7C3AED" stroke-width="2" fill="none"/>
</svg>